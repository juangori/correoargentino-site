<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Correo Argentino Pro</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --dark: #0f172a;
            --dark-deeper: #0a1120;
            --surface: rgba(255,255,255,0.04);
            --surface-hover: rgba(255,255,255,0.07);
            --border: rgba(255,255,255,0.08);
            --border-hover: rgba(255,255,255,0.14);
            --text: rgba(255,255,255,0.92);
            --text-secondary: rgba(255,255,255,0.6);
            --text-muted: rgba(255,255,255,0.38);
            --primary: #3b82f6;
            --accent: #06b6d4;
            --green: #10b981;
            --orange: #f59e0b;
            --red: #ef4444;
            --gradient: linear-gradient(135deg, #3b82f6, #06b6d4);
            --radius: 12px;
            --radius-sm: 8px;
        }
        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--dark);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Login Screen ── */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(ellipse at 30% 20%, rgba(59,130,246,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 80%, rgba(6,182,212,0.06) 0%, transparent 60%),
                        var(--dark);
        }
        .login-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(20px);
        }
        .login-box h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .login-box p { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 24px; }
        .login-box input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: monospace;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .login-box input:focus { border-color: var(--primary); }
        .login-box input::placeholder { color: var(--text-muted); font-family: 'Outfit', sans-serif; }
        .login-box button {
            width: 100%;
            margin-top: 16px;
            padding: 12px;
            background: var(--gradient);
            border: none;
            border-radius: var(--radius-sm);
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .login-box button:hover { opacity: 0.9; }
        .login-error { color: var(--red); font-size: 0.85rem; margin-top: 12px; }

        /* ── Dashboard Layout ── */
        .dashboard { display: none; }
        .dashboard.visible { display: block; }
        .topbar {
            padding: 16px 32px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--dark-deeper);
            position: sticky;
            top: 0;
            z-index: 20;
        }
        .topbar__brand {
            font-size: 1.1rem;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .topbar__nav { display: flex; gap: 4px; }
        .topbar__nav button {
            padding: 8px 16px;
            background: transparent;
            border: none;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .topbar__nav button:hover { color: var(--text); background: var(--surface); }
        .topbar__nav button.active { color: white; background: rgba(59,130,246,0.15); }
        .topbar__logout {
            padding: 6px 14px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-muted);
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .topbar__logout:hover { border-color: var(--red); color: var(--red); }

        .main { max-width: 1200px; margin: 0 auto; padding: 32px; }
        .panel { display: none; }
        .panel.visible { display: block; }

        /* ── Stats Cards ── */
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 24px;
            transition: border-color 0.2s;
        }
        .stat-card:hover { border-color: var(--border-hover); }
        .stat-card__label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .stat-card__value { font-size: 2rem; font-weight: 800; margin-top: 4px; }
        .stat-card__value--blue { color: var(--primary); }
        .stat-card__value--green { color: var(--green); }
        .stat-card__value--orange { color: var(--orange); }
        .stat-card__value--red { color: var(--red); }
        .stat-card__value--cyan { color: var(--accent); }

        /* ── Toolbar ── */
        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .toolbar input, .toolbar select {
            padding: 10px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .toolbar input:focus, .toolbar select:focus { border-color: var(--primary); }
        .toolbar input { flex: 1; min-width: 200px; }
        .toolbar select { min-width: 160px; }
        .toolbar input::placeholder { color: var(--text-muted); }
        .toolbar select option { background: var(--dark); color: var(--text); }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn:hover { opacity: 0.85; }
        .btn--primary { background: var(--gradient); color: white; }
        .btn--ghost { background: var(--surface); color: var(--text-secondary); border: 1px solid var(--border); }
        .btn--danger { background: rgba(239,68,68,0.15); color: var(--red); }
        .btn--small { padding: 6px 12px; font-size: 0.8rem; }

        /* ── Table ── */
        .table-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }
        th {
            text-align: left;
            padding: 14px 16px;
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
            white-space: nowrap;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--surface-hover); }
        td.mono { font-family: monospace; font-size: 0.82rem; color: var(--text); letter-spacing: 0.5px; }

        /* ── Status Badge ── */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge--active { background: rgba(16,185,129,0.15); color: var(--green); }
        .badge--expired { background: rgba(245,158,11,0.15); color: var(--orange); }
        .badge--revoked { background: rgba(239,68,68,0.15); color: var(--red); }
        .badge--unactivated { background: rgba(59,130,246,0.15); color: var(--primary); }
        .badge--pending { background: rgba(245,158,11,0.15); color: var(--orange); }
        .badge--approved { background: rgba(16,185,129,0.15); color: var(--green); }
        .badge--rejected { background: rgba(239,68,68,0.15); color: var(--red); }

        /* Review cards */
        .review-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 24px;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }
        .review-card:hover { border-color: var(--border-hover); }
        .review-card__header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .review-card__name { font-weight: 600; color: var(--text); }
        .review-card__website { font-size: 0.82rem; color: var(--accent); margin-left: 8px; }
        .review-card__stars { color: #f59e0b; font-size: 0.95rem; letter-spacing: 2px; }
        .review-card__comment { font-size: 0.88rem; color: var(--text-secondary); line-height: 1.7; margin: 8px 0; }
        .review-card__footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .review-card__date { font-size: 0.75rem; color: var(--text-muted); }
        .review-card__actions { display: flex; gap: 6px; }

        /* ── Modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #1e293b;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; }
        .modal label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 6px; margin-top: 14px; }
        .modal input, .modal select, .modal textarea {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            outline: none;
        }
        .modal input:focus, .modal select:focus, .modal textarea:focus { border-color: var(--primary); }
        .modal textarea { min-height: 80px; resize: vertical; }
        .modal__actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }

        /* ── Detail view ── */
        .detail-grid {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 8px 16px;
            font-size: 0.9rem;
        }
        .detail-grid dt { color: var(--text-muted); font-weight: 500; }
        .detail-grid dd { color: var(--text); font-family: monospace; font-size: 0.85rem; word-break: break-all; }

        /* ── Messages ── */
        .msg-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 24px;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }
        .msg-card:hover { border-color: var(--border-hover); }
        .msg-card__header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .msg-card__from { font-weight: 600; color: var(--text); }
        .msg-card__email { font-size: 0.82rem; color: var(--accent); }
        .msg-card__subject { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 8px; }
        .msg-card__body { font-size: 0.88rem; color: var(--text-secondary); line-height: 1.7; white-space: pre-wrap; }
        .msg-card__date { font-size: 0.75rem; color: var(--text-muted); margin-top: 10px; }
        .msg-card__delete {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .msg-card__delete:hover { color: var(--red); background: rgba(239,68,68,0.1); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty-state p { font-size: 1.1rem; }

        .loading { text-align: center; padding: 40px; color: var(--text-muted); }

        @media (max-width: 768px) {
            .main { padding: 16px; }
            .topbar { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
            .topbar__nav { order: 3; width: 100%; }
            .topbar__nav button { flex: 1; text-align: center; font-size: 0.8rem; padding: 8px 8px; }
            .stats { grid-template-columns: repeat(2, 1fr); }
            .toolbar { flex-direction: column; }
            .toolbar input, .toolbar select { width: 100%; min-width: auto; }
            .login-box { margin: 16px; padding: 32px 24px; }
            .modal { margin: 16px; }
        }
    </style>
</head>
<body>

<!-- Login -->
<div class="login-screen" id="login-screen">
    <div class="login-box">
        <h1>CA Pro Admin</h1>
        <p>Panel de administracion</p>
        <input type="password" id="token-input" placeholder="API Secret" autofocus>
        <button onclick="doLogin()">Ingresar</button>
        <div class="login-error" id="login-error"></div>
    </div>
</div>

<!-- Dashboard -->
<div class="dashboard" id="dashboard">
    <div class="topbar">
        <span class="topbar__brand">CA Pro Admin</span>
        <div class="topbar__nav">
            <button class="active" onclick="showPanel('licenses', this)">Licencias</button>
            <button onclick="showPanel('messages', this)">Mensajes</button>
            <button onclick="showPanel('reviews', this)">Reseñas</button>
        </div>
        <a href="/" class="topbar__logout" style="text-decoration:none;">Ir al sitio</a>
        <button class="topbar__logout" onclick="doLogout()">Salir</button>
    </div>

    <div class="main">
        <!-- Stats -->
        <div class="stats" id="stats">
            <div class="stat-card"><div class="stat-card__label">Total</div><div class="stat-card__value stat-card__value--blue" id="stat-total">-</div></div>
            <div class="stat-card"><div class="stat-card__label">Activas</div><div class="stat-card__value stat-card__value--green" id="stat-active">-</div></div>
            <div class="stat-card"><div class="stat-card__label">Sin activar</div><div class="stat-card__value stat-card__value--cyan" id="stat-unactivated">-</div></div>
            <div class="stat-card"><div class="stat-card__label">Expiradas</div><div class="stat-card__value stat-card__value--orange" id="stat-expired">-</div></div>
            <div class="stat-card"><div class="stat-card__label">Revocadas</div><div class="stat-card__value stat-card__value--red" id="stat-revoked">-</div></div>
            <div class="stat-card"><div class="stat-card__label">Ingresos</div><div class="stat-card__value" id="stat-revenue">-</div></div>
        </div>

        <!-- Licenses Panel -->
        <div class="panel visible" id="panel-licenses">
            <div class="toolbar">
                <input type="text" id="search-input" placeholder="Buscar por clave, email, dominio...">
                <select id="filter-select">
                    <option value="all">Todas</option>
                    <option value="active">Activas</option>
                    <option value="unactivated">Sin activar</option>
                    <option value="expired">Expiradas</option>
                    <option value="revoked">Revocadas</option>
                </select>
                <button class="btn btn--primary" onclick="openCreateModal()">+ Crear licencia</button>
                <button class="btn btn--ghost" onclick="loadLicenses()">Actualizar</button>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Clave</th>
                            <th>Email</th>
                            <th>Dominio</th>
                            <th>Estado</th>
                            <th>Creada</th>
                            <th>Expira</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="licenses-tbody">
                        <tr><td colspan="7" class="loading">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Messages Panel -->
        <div class="panel" id="panel-messages">
            <div id="messages-list">
                <div class="loading">Cargando mensajes...</div>
            </div>
        </div>

        <!-- Reviews Panel -->
        <div class="panel" id="panel-reviews">
            <div class="toolbar">
                <select id="review-filter-select">
                    <option value="all">Todas</option>
                    <option value="pending">Pendientes</option>
                    <option value="approved">Aprobadas</option>
                    <option value="rejected">Rechazadas</option>
                </select>
                <button class="btn btn--primary" onclick="openReviewModal()">+ Agregar reseña</button>
                <button class="btn btn--ghost" onclick="loadReviews()">Actualizar</button>
            </div>
            <div id="reviews-list">
                <div class="loading">Cargando reseñas...</div>
            </div>
        </div>
    </div>
</div>

<!-- Create License Modal -->
<div class="modal-overlay" id="modal-create">
    <div class="modal">
        <h2>Crear licencia manual</h2>
        <label for="create-email">Email (opcional)</label>
        <input type="email" id="create-email" placeholder="cliente@email.com">
        <label for="create-days">Duracion (dias)</label>
        <input type="number" id="create-days" value="365" min="1">
        <label for="create-notes">Notas (opcional)</label>
        <textarea id="create-notes" placeholder="Ej: Licencia de cortesia, test..."></textarea>
        <div class="modal__actions">
            <button class="btn btn--ghost" onclick="closeModal('modal-create')">Cancelar</button>
            <button class="btn btn--primary" onclick="createLicense()">Crear</button>
        </div>
    </div>
</div>

<!-- License Detail Modal -->
<div class="modal-overlay" id="modal-detail">
    <div class="modal">
        <h2>Detalle de licencia</h2>
        <dl class="detail-grid" id="detail-content"></dl>
        <div class="modal__actions" id="detail-actions"></div>
    </div>
</div>

<!-- Create/Edit Review Modal -->
<div class="modal-overlay" id="modal-review">
    <div class="modal">
        <h2 id="review-modal-title">Agregar reseña</h2>
        <input type="hidden" id="review-edit-id">
        <label for="review-name">Nombre</label>
        <input type="text" id="review-name" placeholder="Nombre del cliente">
        <label for="review-website">Sitio web (opcional)</label>
        <input type="text" id="review-website" placeholder="mitienda.com.ar">
        <label for="review-rating">Calificación</label>
        <select id="review-rating">
            <option value="5">5 estrellas</option>
            <option value="4">4 estrellas</option>
            <option value="3">3 estrellas</option>
            <option value="2">2 estrellas</option>
            <option value="1">1 estrella</option>
        </select>
        <label for="review-comment">Comentario</label>
        <textarea id="review-comment" placeholder="Comentario de la reseña..."></textarea>
        <div class="modal__actions">
            <button class="btn btn--ghost" onclick="closeModal('modal-review')">Cancelar</button>
            <button class="btn btn--primary" onclick="saveReview()">Guardar</button>
        </div>
    </div>
</div>

<script>
(function() {
    var API = 'https://api.correoargentinopro.com';
    var token = '';

    // Expose functions to window
    window.doLogin = doLogin;
    window.doLogout = doLogout;
    window.showPanel = showPanel;
    window.loadLicenses = loadLicenses;
    window.openCreateModal = openCreateModal;
    window.createLicense = createLicense;
    window.closeModal = closeModal;
    window.viewLicense = viewLicense;
    window.revokeLicense = revokeLicense;
    window.reactivateLicense = reactivateLicense;
    window.extendLicense = extendLicense;
    window.deleteMessage = deleteMessage;
    window.loadReviews = loadReviews;
    window.openReviewModal = openReviewModal;
    window.saveReview = saveReview;
    window.approveReview = approveReview;
    window.rejectReview = rejectReview;
    window.editReview = editReview;
    window.deleteReview = deleteReview;

    // Check saved token
    var saved = sessionStorage.getItem('cap_token');
    if (saved) {
        token = saved;
        enterDashboard();
    }

    // Login on Enter
    document.getElementById('token-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') doLogin();
    });

    function doLogin() {
        var input = document.getElementById('token-input');
        var err = document.getElementById('login-error');
        token = input.value.trim();
        if (!token) { err.textContent = 'Ingresa el API Secret'; return; }
        err.textContent = '';
        // Validate by calling stats
        apiFetch('/admin/stats').then(function(data) {
            if (data.error) { err.textContent = 'Token invalido'; token = ''; return; }
            sessionStorage.setItem('cap_token', token);
            enterDashboard();
        }).catch(function() { err.textContent = 'Error de conexion'; token = ''; });
    }

    function doLogout() {
        token = '';
        sessionStorage.removeItem('cap_token');
        document.getElementById('dashboard').classList.remove('visible');
        document.getElementById('login-screen').style.display = '';
        document.getElementById('token-input').value = '';
    }

    function enterDashboard() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').classList.add('visible');
        loadStats();
        loadLicenses();

        // Debounced search
        var searchTimer;
        document.getElementById('search-input').addEventListener('input', function() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(loadLicenses, 400);
        });
        document.getElementById('filter-select').addEventListener('change', loadLicenses);
    }

    function apiFetch(path, opts) {
        opts = opts || {};
        opts.headers = opts.headers || {};
        opts.headers['Authorization'] = 'Bearer ' + token;
        opts.headers['Content-Type'] = 'application/json';
        return fetch(API + path, opts).then(function(r) { return r.json(); });
    }

    function loadStats() {
        apiFetch('/admin/stats').then(function(s) {
            document.getElementById('stat-total').textContent = s.total || 0;
            document.getElementById('stat-active').textContent = s.active || 0;
            document.getElementById('stat-unactivated').textContent = s.unactivated || 0;
            document.getElementById('stat-expired').textContent = s.expired || 0;
            document.getElementById('stat-revoked').textContent = s.revoked || 0;
            document.getElementById('stat-revenue').textContent = '$' + ((s.revenue || 0) / 1).toLocaleString('es-AR');
        });
    }

    function loadLicenses() {
        var search = document.getElementById('search-input').value;
        var filter = document.getElementById('filter-select').value;
        var qs = '?filter=' + filter;
        if (search) qs += '&search=' + encodeURIComponent(search);

        var tbody = document.getElementById('licenses-tbody');
        tbody.innerHTML = '<tr><td colspan="7" class="loading">Cargando...</td></tr>';

        apiFetch('/admin/licenses' + qs).then(function(data) {
            if (!data.licenses || data.licenses.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="loading">No se encontraron licencias</td></tr>';
                return;
            }
            tbody.innerHTML = data.licenses.map(function(l) {
                var status = l._effective_status || 'unactivated';
                var badge = '<span class="badge badge--' + status + '">' + statusLabel(status) + '</span>';
                return '<tr>' +
                    '<td class="mono">' + l.key + '</td>' +
                    '<td>' + (l.email || '-') + '</td>' +
                    '<td>' + (l.domain || '<span style="color:var(--text-muted)">-</span>') + '</td>' +
                    '<td>' + badge + '</td>' +
                    '<td>' + formatDate(l.created_at) + '</td>' +
                    '<td>' + formatDate(l.expires_at) + '</td>' +
                    '<td><button class="btn btn--ghost btn--small" onclick="viewLicense(\'' + l.key + '\')">Ver</button></td>' +
                    '</tr>';
            }).join('');
        });
    }

    function viewLicense(key) {
        apiFetch('/admin/license/' + key).then(function(l) {
            if (l.error) { alert('Licencia no encontrada'); return; }

            var status = l._effective_status || 'unactivated';
            var html = '' +
                '<dt>Clave</dt><dd>' + l.key + '</dd>' +
                '<dt>Email</dt><dd>' + (l.email || '-') + '</dd>' +
                '<dt>Dominio</dt><dd>' + (l.domain || 'No activada') + '</dd>' +
                '<dt>Estado</dt><dd><span class="badge badge--' + status + '">' + statusLabel(status) + '</span></dd>' +
                '<dt>Creada</dt><dd>' + formatDateTime(l.created_at) + '</dd>' +
                '<dt>Expira</dt><dd>' + formatDateTime(l.expires_at) + '</dd>' +
                '<dt>Activada</dt><dd>' + (l.activated_at ? formatDateTime(l.activated_at) : 'No') + '</dd>' +
                '<dt>Pago ID</dt><dd>' + (l.payment_id || '-') + '</dd>' +
                '<dt>Monto</dt><dd>' + (l.payment_amount ? '$' + l.payment_amount.toLocaleString('es-AR') + ' ' + (l.payment_currency || '') : '-') + '</dd>';
            if (l.notes) html += '<dt>Notas</dt><dd>' + escapeHtml(l.notes) + '</dd>';

            document.getElementById('detail-content').innerHTML = html;

            var actions = '<button class="btn btn--ghost" onclick="closeModal(\'modal-detail\')">Cerrar</button>';
            if (status !== 'revoked') {
                actions += ' <button class="btn btn--danger btn--small" onclick="revokeLicense(\'' + l.key + '\')">Revocar</button>';
            } else {
                actions += ' <button class="btn btn--primary btn--small" onclick="reactivateLicense(\'' + l.key + '\')">Reactivar</button>';
            }
            if (status === 'expired') {
                actions += ' <button class="btn btn--primary btn--small" onclick="extendLicense(\'' + l.key + '\', 365)">Extender 1 año</button>';
            }
            actions += ' <button class="btn btn--ghost btn--small" onclick="extendLicense(\'' + l.key + '\', 30)">+30 dias</button>';
            actions += ' <button class="btn btn--ghost btn--small" onclick="extendLicense(\'' + l.key + '\', 365)">+1 año</button>';
            document.getElementById('detail-actions').innerHTML = actions;

            openModal('modal-detail');
        });
    }

    function revokeLicense(key) {
        if (!confirm('Revocar la licencia ' + key + '?')) return;
        apiFetch('/admin/license/' + key, {
            method: 'PUT',
            body: JSON.stringify({ action: 'revoke' })
        }).then(function() {
            closeModal('modal-detail');
            loadLicenses();
            loadStats();
        });
    }

    function reactivateLicense(key) {
        apiFetch('/admin/license/' + key, {
            method: 'PUT',
            body: JSON.stringify({ action: 'reactivate' })
        }).then(function() {
            closeModal('modal-detail');
            loadLicenses();
            loadStats();
        });
    }

    function extendLicense(key, days) {
        apiFetch('/admin/license/' + key, {
            method: 'PUT',
            body: JSON.stringify({ action: 'extend', days: days })
        }).then(function() {
            closeModal('modal-detail');
            loadLicenses();
            loadStats();
        });
    }

    function openCreateModal() { openModal('modal-create'); }

    function createLicense() {
        var email = document.getElementById('create-email').value;
        var days = parseInt(document.getElementById('create-days').value) || 365;
        var notes = document.getElementById('create-notes').value;

        apiFetch('/admin/license/create', {
            method: 'POST',
            body: JSON.stringify({ email: email, duration_days: days, notes: notes })
        }).then(function(data) {
            if (data.success) {
                closeModal('modal-create');
                document.getElementById('create-email').value = '';
                document.getElementById('create-days').value = '365';
                document.getElementById('create-notes').value = '';
                loadLicenses();
                loadStats();
                alert('Licencia creada: ' + data.license.key);
            } else {
                alert('Error: ' + (data.error || 'desconocido'));
            }
        });
    }

    // Messages
    function loadMessages() {
        var container = document.getElementById('messages-list');
        container.innerHTML = '<div class="loading">Cargando mensajes...</div>';

        apiFetch('/admin/messages').then(function(data) {
            if (!data.messages || data.messages.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No hay mensajes</p></div>';
                return;
            }
            container.innerHTML = data.messages.map(function(m) {
                return '<div class="msg-card">' +
                    '<div class="msg-card__header">' +
                        '<div><span class="msg-card__from">' + escapeHtml(m.name) + '</span> <span class="msg-card__email">&lt;' + escapeHtml(m.email) + '&gt;</span></div>' +
                        '<button class="msg-card__delete" onclick="deleteMessage(\'' + m.id + '\', this)" title="Eliminar">Eliminar</button>' +
                    '</div>' +
                    '<div class="msg-card__subject">' + escapeHtml(m.subject) + '</div>' +
                    '<div class="msg-card__body">' + escapeHtml(m.message) + '</div>' +
                    '<div class="msg-card__date">' + formatDateTime(m.created_at) + '</div>' +
                '</div>';
            }).join('');
        });
    }

    function deleteMessage(id, btn) {
        if (!confirm('Eliminar este mensaje?')) return;
        apiFetch('/admin/messages/' + id, { method: 'DELETE' }).then(function() {
            var card = btn.closest('.msg-card');
            if (card) card.remove();
        });
    }

    // Panel switching
    function showPanel(name, btn) {
        document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('visible'); });
        document.getElementById('panel-' + name).classList.add('visible');
        document.querySelectorAll('.topbar__nav button').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');

        if (name === 'messages') loadMessages();
        if (name === 'reviews') loadReviews();
        if (name === 'licenses') { loadLicenses(); loadStats(); }
    }

    // Modal helpers
    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    // Click outside modal to close
    document.querySelectorAll('.modal-overlay').forEach(function(overlay) {
        overlay.addEventListener('click', function(e) {
            if (e.target === overlay) overlay.classList.remove('open');
        });
    });

    // Reviews
    function loadReviews() {
        var filter = document.getElementById('review-filter-select').value;
        var container = document.getElementById('reviews-list');
        container.innerHTML = '<div class="loading">Cargando reseñas...</div>';

        apiFetch('/admin/reviews?filter=' + filter).then(function(data) {
            if (!data.reviews || data.reviews.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No hay reseñas</p></div>';
                return;
            }
            container.innerHTML = data.reviews.map(function(r) {
                var stars = '';
                for (var i = 0; i < 5; i++) stars += i < r.rating ? '\u2605' : '\u2606';
                var statusBadge = '<span class="badge badge--' + r.status + '">' + reviewStatusLabel(r.status) + '</span>';
                var actions = '';
                if (r.status === 'pending') {
                    actions += '<button class="btn btn--primary btn--small" onclick="approveReview(\'' + r.id + '\')">Aprobar</button>';
                    actions += '<button class="btn btn--danger btn--small" onclick="rejectReview(\'' + r.id + '\')">Rechazar</button>';
                } else if (r.status === 'rejected') {
                    actions += '<button class="btn btn--primary btn--small" onclick="approveReview(\'' + r.id + '\')">Aprobar</button>';
                } else {
                    actions += '<button class="btn btn--danger btn--small" onclick="rejectReview(\'' + r.id + '\')">Rechazar</button>';
                }
                actions += '<button class="btn btn--ghost btn--small" onclick="editReview(\'' + r.id + '\')">Editar</button>';
                actions += '<button class="btn btn--ghost btn--small" onclick="deleteReview(\'' + r.id + '\')" style="color:var(--red)">Eliminar</button>';

                return '<div class="review-card">' +
                    '<div class="review-card__header">' +
                        '<div><span class="review-card__name">' + escapeHtml(r.name) + '</span>' +
                        (r.website ? '<span class="review-card__website">' + escapeHtml(r.website) + '</span>' : '') +
                        '</div>' +
                        statusBadge +
                    '</div>' +
                    '<div class="review-card__stars">' + stars + '</div>' +
                    '<div class="review-card__comment">' + escapeHtml(r.comment) + '</div>' +
                    '<div class="review-card__footer">' +
                        '<span class="review-card__date">' + formatDateTime(r.created_at) + '</span>' +
                        '<div class="review-card__actions">' + actions + '</div>' +
                    '</div>' +
                '</div>';
            }).join('');
        });

        // Attach filter listener once
        if (!loadReviews._bound) {
            document.getElementById('review-filter-select').addEventListener('change', loadReviews);
            loadReviews._bound = true;
        }
    }

    function openReviewModal(review) {
        document.getElementById('review-modal-title').textContent = review ? 'Editar reseña' : 'Agregar reseña';
        document.getElementById('review-edit-id').value = review ? review.id : '';
        document.getElementById('review-name').value = review ? review.name : '';
        document.getElementById('review-website').value = review ? review.website : '';
        document.getElementById('review-rating').value = review ? review.rating : '5';
        document.getElementById('review-comment').value = review ? review.comment : '';
        openModal('modal-review');
    }

    function saveReview() {
        var editId = document.getElementById('review-edit-id').value;
        var payload = {
            name: document.getElementById('review-name').value,
            website: document.getElementById('review-website').value,
            rating: parseInt(document.getElementById('review-rating').value),
            comment: document.getElementById('review-comment').value,
        };

        if (!payload.name || !payload.comment) {
            alert('Nombre y comentario son obligatorios');
            return;
        }

        var url, method;
        if (editId) {
            url = '/admin/reviews/' + editId;
            method = 'PUT';
        } else {
            url = '/admin/reviews';
            method = 'POST';
            payload.status = 'approved';
        }

        apiFetch(url, { method: method, body: JSON.stringify(payload) }).then(function(data) {
            if (data.success || data.review) {
                closeModal('modal-review');
                loadReviews();
            } else {
                alert('Error: ' + (data.error || 'desconocido'));
            }
        });
    }

    function approveReview(id) {
        apiFetch('/admin/reviews/' + id, { method: 'PUT', body: JSON.stringify({ action: 'approve' }) }).then(function() { loadReviews(); });
    }

    function rejectReview(id) {
        apiFetch('/admin/reviews/' + id, { method: 'PUT', body: JSON.stringify({ action: 'reject' }) }).then(function() { loadReviews(); });
    }

    function editReview(id) {
        apiFetch('/admin/reviews?filter=all').then(function(list) {
            var review = list.reviews.find(function(r) { return r.id === id; });
            if (review) openReviewModal(review);
        });
    }

    function deleteReview(id) {
        if (!confirm('Eliminar esta reseña?')) return;
        apiFetch('/admin/reviews/' + id, { method: 'DELETE' }).then(function() { loadReviews(); });
    }

    function reviewStatusLabel(s) {
        var map = { pending: 'Pendiente', approved: 'Aprobada', rejected: 'Rechazada' };
        return map[s] || s;
    }

    // Formatting
    function formatDate(iso) {
        if (!iso) return '-';
        var d = new Date(iso);
        return d.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: '2-digit' });
    }
    function formatDateTime(iso) {
        if (!iso) return '-';
        var d = new Date(iso);
        return d.toLocaleString('es-AR', { day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute: '2-digit' });
    }
    function statusLabel(s) {
        var map = { active: 'Activa', expired: 'Expirada', revoked: 'Revocada', unactivated: 'Sin activar' };
        return map[s] || s;
    }
    function escapeHtml(text) {
        var div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
})();
</script>

</body>
</html>
